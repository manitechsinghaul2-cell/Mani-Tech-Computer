<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Noto+Sans:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans',sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{background:linear-gradient(135deg,#1e3a8a 0%,#4c1d95 60%,#6d28d9 100%);padding:16px 16px 13px;position:sticky;top:0;z-index:20;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.logo-box{width:44px;height:44px;background:rgba(255,255,255,0.18);border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;border:1.5px solid rgba(255,255,255,0.25)}
.title{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;color:#fff}
.subtitle{font-size:10px;color:rgba(255,255,255,0.7);margin-top:1px}
.sync-badge{background:rgba(255,255,255,0.15);border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;gap:4px}
.sync-badge.connected{background:#10b98133;color:#6ee7b7;border:1px solid #10b98155}
.sync-badge.disconnected{background:#ef444433;color:#fca5a5;border:1px solid #ef444455}
.sync-badge.syncing{background:#f59e0b33;color:#fde68a;border:1px solid #f59e0b55}
.nav{display:flex;background:#ffffff;border-top:1px solid #e2e8f0;box-shadow:0 -4px 16px rgba(0,0,0,0.12);position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;z-index:30;padding-bottom:env(safe-area-inset-bottom,0px)}
.nav-btn{flex:1;min-width:0;padding:8px 2px 6px;background:none;border:none;color:#94a3b8;font-size:9px;font-weight:600;cursor:pointer;border-top:2px solid transparent;transition:all .2s;font-family:'Noto Sans',sans-serif;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-btn .nav-icon{font-size:20px;line-height:1}
.nav-btn.active{color:#7c3aed;border-top-color:#7c3aed;background:rgba(139,92,246,0.06)}
.content{flex:1;padding:14px;padding-bottom:90px;overflow-y:auto}
.card{background:#ffffff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #e2e8f0;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:#ffffff;border-radius:16px;padding:14px;text-align:left;box-shadow:0 2px 8px rgba(0,0,0,0.08);border:1px solid #e2e8f0}
.stat-icon{font-size:20px;margin-bottom:6px}
.stat-value{font-size:19px;font-weight:800;font-family:'Baloo 2',cursive}
.stat-label{font-size:10px;color:#94a3b8;margin-top:2px}
.btn{border:none;border-radius:10px;cursor:pointer;font-weight:700;font-family:'Noto Sans',sans-serif;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:linear-gradient(135deg,#1e40af,#7c3aed);color:#fff;padding:11px;width:100%;font-size:13px;border-radius:12px;margin-bottom:12px}
.btn-green{background:#25D366;color:#fff}
.btn-blue{background:#1e40af;color:#fff}
.btn-red{background:#ef4444;color:#fff}
.btn-gray{background:#e2e8f0;color:#334155}
.input{width:100%;padding:12px 14px;background:#f8fafc;border:1.5px solid #cbd5e1;border-radius:11px;color:#1e293b;font-size:14px;font-family:'Noto Sans',sans-serif;outline:none;transition:border-color .2s}
.input:focus{border-color:#818cf8}
label{font-size:11px;color:#94a3b8;display:block;margin-bottom:4px;margin-top:10px}
.badge{border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700}
.badge-red{background:#ef444422;color:#ef4444}
.badge-green{background:#10b98122;color:#10b981}
.badge-purple{background:#7c3aed;color:#fff}
.progress-track{height:6px;background:#e2e8f0;border-radius:3px;margin:8px 0}
.progress-bar{height:100%;border-radius:3px;transition:width .3s}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;display:flex;align-items:flex-end;backdrop-filter:blur(4px)}
.modal{background:#ffffff;width:100%;max-width:430px;margin:0 auto;border-radius:22px 22px 0 0;padding:22px;max-height:90vh;overflow-y:auto;border-top:1px solid #e2e8f0}
.modal-title{font-size:15px;font-weight:800;margin-bottom:14px;font-family:'Baloo 2',cursive}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);padding:10px 18px;border-radius:12px;z-index:300;font-size:13px;font-weight:600;color:#fff;max-width:320px;text-align:center;box-shadow:0 4px 20px rgba(0,0,0,0.4);pointer-events:none;transition:opacity .3s}
.row-btns{display:flex;gap:8px;margin-top:10px}
.row-btns .btn{flex:1;padding:8px;font-size:12px;border-radius:8px}
.section-title{font-size:13px;font-weight:700;margin-bottom:10px;color:#c4b5fd;font-family:'Baloo 2',cursive}
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.quick-btn{padding:5px 12px;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-weight:600;font-family:'Noto Sans',sans-serif;background:#334155;color:#fff;transition:background .15s}
.quick-btn.selected{background:#1e40af}
.course-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#f8fafc;border-radius:12px;margin-bottom:8px;border:1px solid #e2e8f0}
.course-info{flex:1}
.course-name-text{font-size:13px;font-weight:600}
.course-meta{font-size:10px;color:#94a3b8;margin-top:2px}
.course-actions{display:flex;gap:6px}
.icon-btn{width:28px;height:28px;border:none;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.empty{text-align:center;color:#64748b;font-size:13px;padding:30px 0}
.info-box{background:#7c3aed22;border:1px solid #7c3aed44;border-radius:10px;padding:8px 12px;margin-top:8px;font-size:12px;color:#c4b5fd}
.step-box{background:#111827;border-radius:12px;padding:13px;margin-bottom:10px;border-left:3px solid #7c3aed}
.step-num{font-size:10px;font-weight:700;color:#818cf8;margin-bottom:4px}
.step-text{font-size:12px;line-height:1.7}
.code-box{background:#000;border-radius:8px;padding:10px;font-family:monospace;font-size:9px;color:#86efac;margin:6px 0;overflow-x:auto;white-space:pre-wrap;word-break:break-all;line-height:1.5}
.warning-box{background:#f59e0b11;border:1px solid #f59e0b44;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#fde68a;line-height:1.5}
.success-box{background:#10b98111;border:1px solid #10b98144;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#6ee7b7;line-height:1.5}
/* Receipt styles */
.rec-form-group{margin-bottom:10px}
.rec-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.receipt-preview{background:#f8f8f8;border-radius:12px;padding:14px;margin-top:14px}
.receipt-box{background:#fff;border-radius:8px;padding:20px;font-family:Arial,sans-serif;color:#111;border:1px solid #ddd;font-size:12px}
.rec-header{text-align:center;margin-bottom:14px}
.rec-logo img{height:56px;object-fit:contain;display:block;margin:0 auto}
.rec-subhead{font-size:9px;color:#555;margin-top:2px}
.rec-title-bar{font-size:15px;font-weight:700;border-top:2px solid #1a237e;border-bottom:2px solid #1a237e;padding:5px 0;margin:8px 0;letter-spacing:1px}
.rec-student-row{display:flex;gap:10px;margin-bottom:12px;align-items:flex-start}
.rec-photo{width:50px;height:58px;border:1px solid #ddd;border-radius:4px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.rec-info{flex:1}
.rec-name-text{font-size:13px;font-weight:700}
.rec-sub{font-size:10px;color:#333;margin-top:2px;line-height:1.6}
.rec-date-box{font-size:11px;font-weight:700;text-align:right;white-space:nowrap}
.rec-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
.rec-table th{background:#1a237e;color:#fff;padding:5px 7px;text-align:left;font-size:10px}
.rec-table th:last-child,.rec-table td:last-child{text-align:right}
.rec-table td{padding:7px 7px;border-bottom:1px solid #eee}
.rec-table .total-row td{font-weight:700;border-top:2px solid #111;border-bottom:none}
.rec-payment-text{font-size:11px;font-weight:600;margin-bottom:14px}
.rec-footer-row{display:flex;justify-content:space-between;align-items:flex-end;border-top:1px solid #ddd;padding-top:10px}
.rec-sign{text-align:right}
.rec-sign-line{border-top:1.5px solid #111;width:90px;margin-bottom:3px}
.rec-sign-name{font-size:10px;font-weight:700}
.rec-sign-role{font-size:9px;color:#555}
.rec-inst-name{font-size:10px;font-weight:700}
.rec-inst-info{font-size:9px;color:#555;line-height:1.6}
.share-btns{display:flex;gap:8px;margin-top:10px}
.share-btns .btn{flex:1;padding:10px;font-size:12px;border-radius:10px;display:flex;align-items:center;justify-content:center;gap:6px}

/* AI Chat styles */
.ai-chat-container{display:flex;flex-direction:column;height:calc(100vh - 160px);background:#0f172a;border-radius:16px;overflow:hidden;border:1px solid #334155}
.ai-chat-header{background:linear-gradient(135deg,#1e1b4b,#4c1d95);padding:14px 16px;display:flex;align-items:center;gap:10px}
.ai-chat-avatar{width:36px;height:36px;background:linear-gradient(135deg,#7c3aed,#4f46e5);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ai-chat-title{font-size:14px;font-weight:800;color:#fff}
.ai-chat-subtitle{font-size:10px;color:#c4b5fd;margin-top:1px}
.ai-messages{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.ai-msg{max-width:85%;padding:10px 13px;border-radius:14px;font-size:13px;line-height:1.6}
.ai-msg.user{background:linear-gradient(135deg,#1e40af,#7c3aed);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.ai-msg.bot{background:#1e293b;color:#e2e8f0;align-self:flex-start;border-bottom-left-radius:4px;border:1px solid #334155}
.ai-msg.bot.loading{color:#64748b}
.ai-typing{display:flex;gap:4px;align-items:center;padding:4px 0}
.ai-typing span{width:7px;height:7px;background:#818cf8;border-radius:50%;animation:typingDot 1.2s infinite}
.ai-typing span:nth-child(2){animation-delay:0.2s}
.ai-typing span:nth-child(3){animation-delay:0.4s}
@keyframes typingDot{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.ai-input-row{display:flex;gap:8px;padding:12px;background:#1e293b;border-top:1px solid #334155}
.ai-input{flex:1;background:#0f172a;border:1.5px solid #334155;border-radius:12px;padding:10px 14px;color:#e2e8f0;font-size:13px;font-family:'Noto Sans',sans-serif;outline:none;resize:none;max-height:80px}
.ai-input:focus{border-color:#818cf8}
.ai-send-btn{width:40px;height:40px;background:linear-gradient(135deg,#4f46e5,#7c3aed);border:none;border-radius:12px;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .15s}
.ai-send-btn:active{opacity:.7}
.ai-send-btn:disabled{background:#334155;cursor:not-allowed}
.ai-quick-btns{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;border-top:1px solid #1e293b;background:#0f172a}
.ai-quick-btns::-webkit-scrollbar{display:none}
.ai-quick-btn{white-space:nowrap;padding:6px 12px;background:#1e293b;border:1px solid #334155;border-radius:20px;color:#c4b5fd;font-size:11px;font-weight:600;cursor:pointer;font-family:'Noto Sans',sans-serif;transition:background .15s}
.ai-quick-btn:hover{background:#334155}

.rc-box{background:#fff;border-radius:10px;padding:18px;font-family:Arial,sans-serif;color:#111;border:2px solid #1a237e;font-size:12px}
.rc-header{text-align:center;border-bottom:3px double #1a237e;padding-bottom:10px;margin-bottom:12px}
.rc-title{font-size:16px;font-weight:900;color:#1a237e;letter-spacing:1px}
.rc-sub{font-size:9px;color:#555;margin-top:2px}
.rc-card-title{font-size:13px;font-weight:800;background:#1a237e;color:#fff;text-align:center;padding:5px;letter-spacing:2px;margin-bottom:12px}
.rc-info-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 12px;margin-bottom:12px;font-size:11px}
.rc-info-row{display:flex;gap:4px;align-items:baseline}
.rc-info-label{color:#555;white-space:nowrap}
.rc-info-val{font-weight:700;border-bottom:1px solid #ccc;flex:1}
.rc-table{width:100%;border-collapse:collapse;font-size:11px;margin-bottom:10px}
.rc-table th{background:#1a237e;color:#fff;padding:6px 8px;text-align:center}
.rc-table td{padding:6px 8px;border:1px solid #ddd;text-align:center}
.rc-table tr:nth-child(even) td{background:#f5f7ff}
.rc-total-row td{background:#e8eaf6!important;font-weight:800;border-top:2px solid #1a237e}
.rc-result-box{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-radius:8px;margin-bottom:10px}
.rc-footer{display:flex;justify-content:space-between;align-items:flex-end;border-top:2px solid #1a237e;padding-top:8px;margin-top:4px}
.rc-sign-block{text-align:center}
.rc-sign-line{border-top:1.5px solid #111;width:80px;margin:0 auto 3px}
/* Birthday card styles */
.bday-upcoming-row{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#1f2937;border-radius:10px;margin-bottom:7px;border-left:3px solid #f59e0b}
.bday-days-badge{background:#f59e0b;color:#000;font-weight:800;font-size:10px;padding:3px 8px;border-radius:20px}
/* Attendance styles */
.att-student-row{display:flex;align-items:center;justify-content:space-between;padding:11px 13px;background:#f8fafc;border-radius:12px;margin-bottom:8px;border:1px solid #e2e8f0;transition:border-color .2s}
.att-student-row.present{border-color:#10b98155;background:#10b98108}
.att-student-row.absent{border-color:#ef444455;background:#ef444408}
.att-toggle{display:flex;gap:6px}
.att-btn{width:36px;height:36px;border:none;border-radius:10px;font-size:16px;cursor:pointer;font-weight:700;transition:all .15s;display:flex;align-items:center;justify-content:center}
.att-btn.p-btn{background:#10b98122;color:#10b981}
.att-btn.p-btn.active{background:#10b981;color:#fff;transform:scale(1.1)}
.att-btn.a-btn{background:#ef444422;color:#ef4444}
.att-btn.a-btn.active{background:#ef4444;color:#fff;transform:scale(1.1)}
.att-month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-top:8px}
.att-day-cell{aspect-ratio:1;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700}
.att-day-cell.P{background:#10b981;color:#fff}
.att-day-cell.A{background:#ef4444;color:#fff}
.att-day-cell.H{background:#f59e0b;color:#fff}
.att-day-cell.empty{background:#1f2937;color:#374151}
.att-day-cell.future{background:#1f2937;color:#374151;opacity:0.4}
.att-summary{display:flex;gap:8px;margin-bottom:12px}
.att-sum-box{flex:1;background:#1f2937;border-radius:12px;padding:10px;text-align:center;border:1px solid #374151}
.att-sum-val{font-size:18px;font-weight:800;font-family:'Baloo 2',cursive}
.att-sum-label{font-size:9px;color:#94a3b8;margin-top:2px}
</style>

<script>
const DEFAULT_COURSES=[
  {id:'c1',name:"ADCA",duration:"12 Months",fee:9000},
  {id:'c2',name:"DCA",duration:"6 Months",fee:4500},
  {id:'c3',name:"Tally + GST",duration:"3 Months",fee:3000},
  {id:'c4',name:"MS Office",duration:"2 Months",fee:2000},
  {id:'c5',name:"Web Design",duration:"6 Months",fee:6000},
  {id:'c6',name:"Python Programming",duration:"4 Months",fee:5000},
  {id:'c7',name:"Hardware & Networking",duration:"6 Months",fee:7000},
  {id:'c8',name:"Graphic Design",duration:"3 Months",fee:4000},
];
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}

let courses=load('mani_courses',DEFAULT_COURSES);
let students=load('mani_students',[]);
let scriptUrl=load('mani_script_url','');
let activeTab='dashboard';
let isSyncing=false;
let lastSyncTime=load('mani_last_sync',null);
let toastTimer=null;

function saveAll(){save('mani_courses',courses);save('mani_students',students);}
let attendance=load('mani_attendance',{}); // {dateStr: {studentId: 'P'/'A'/'H'}}
let paymentHistory=load('mani_payment_history',[]);
function saveAttendance(){
  save('mani_attendance',attendance);
  // Push to Google Sheets in background (debounced)
  if(window._attSyncTimer) clearTimeout(window._attSyncTimer);
  window._attSyncTimer=setTimeout(()=>pushAttendance(),2000);
}
let exams=load('mani_exams',[]);
let results=load('mani_results',{});
let timetable=load('mani_timetable',{});
function saveExams(){save('mani_exams',exams);}
function saveResults(){save('mani_results',results);}
function saveTimetable(){save('mani_timetable',timetable);}
function todayStr(){return new Date().toISOString().split('T')[0];}
function getMonthStr(y,m){return y+'-'+(m<10?'0'+m:m);}
function attStats(sid){
  let p=0,a=0,h=0,total=0;
  Object.values(attendance).forEach(dayRec=>{
    const v=dayRec[sid];
    if(v==='P'){p++;total++;}
    else if(v==='A'){a++;total++;}
    else if(v==='H'){h++;total++;}
  });
  return {p,a,h,total,pct:total?Math.round((p/total)*100):0};
}
function markAtt(sid,val,date){
  const d=date||todayStr();
  if(!attendance[d]) attendance[d]={};
  if(attendance[d][sid]===val) delete attendance[d][sid];
  else attendance[d][sid]=val;
  saveAttendance();
  renderContent();
}
function markAllPresent(date){
  const d=date||todayStr();
  if(!attendance[d]) attendance[d]={};
  students.forEach(s=>{attendance[d][s.id]='P';});
  saveAttendance();renderContent();
  showToast('Sabka Present mark ho gaya! ✅');
}

/* ---- ATTENDANCE TAB ---- */
function renderAttendance(){
  const today=todayStr();
  const selDate=(document.getElementById('att-date-sel')||{}).value||today;
  const selCourse=(document.getElementById('att-course-sel')||{}).value||'All';
  const viewMode=(document.getElementById('att-view-mode')||{}).value||'mark';

  if(viewMode==='report') return renderAttReport(selCourse);

  // Mark attendance view
  const dayRec=attendance[selDate]||{};
  const filtered=students.filter(s=>selCourse==='All'||s.courseId===selCourse);
  const presentCount=filtered.filter(s=>dayRec[s.id]==='P').length;
  const absentCount=filtered.filter(s=>dayRec[s.id]==='A').length;
  const unmarked=filtered.filter(s=>!dayRec[s.id]).length;

  let html=`
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <div style="flex:1">
      <label>Date</label>
      <input type="date" class="input" id="att-date-sel" value="${selDate}" onchange="renderContent()" style="font-size:12px">
    </div>
    <div style="flex:1">
      <label>View</label>
      <select class="input" id="att-view-mode" onchange="renderContent()" style="font-size:12px">
        <option value="mark" ${viewMode==='mark'?'selected':''}>📋 Mark Karo</option>
        <option value="report" ${viewMode==='report'?'selected':''}>📊 Report</option>
      </select>
    </div>
  </div>
  <select class="input" id="att-course-sel" onchange="renderContent()" style="margin-bottom:10px;font-size:12px">
    <option value="All">Sabhi Courses</option>
    ${courses.map(c=>`<option value="${c.id}" ${selCourse===c.id?'selected':''}>${c.name}</option>`).join('')}
  </select>
  <div class="att-summary">
    <div class="att-sum-box"><div class="att-sum-val" style="color:#10b981">${presentCount}</div><div class="att-sum-label">✅ Present</div></div>
    <div class="att-sum-box"><div class="att-sum-val" style="color:#ef4444">${absentCount}</div><div class="att-sum-label">❌ Absent</div></div>
    <div class="att-sum-box"><div class="att-sum-val" style="color:#f59e0b">${unmarked}</div><div class="att-sum-label">⏳ Baaki</div></div>
  </div>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <button class="btn" style="flex:1;padding:9px;background:#10b98122;color:#10b981;border-radius:10px;font-size:12px" onclick="markAllPresent('${selDate}')">✅ Sabko Present</button>
    <button class="btn" style="flex:1;padding:9px;background:#ef444422;color:#ef4444;border-radius:10px;font-size:12px" onclick="markAllAbsent('${selDate}','${selCourse}')">❌ Sabko Absent</button>
  </div>
  <button class="btn" style="width:100%;padding:9px;background:#25D366;color:#fff;border-radius:10px;font-size:12px;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px" onclick="sendAllAbsentWA('${selDate}','${selCourse}')">📲 Sabko Absent Ka WhatsApp Bhejo (${absentCount})</button>
  <div style="font-size:11px;color:#94a3b8;margin-bottom:8px;font-weight:600">P = Present &nbsp; A = Absent &nbsp; H = Holiday</div>`;

  if(!filtered.length) return html+`<div class="empty">Koi student nahi</div>`;

  filtered.forEach(s=>{
    const val=dayRec[s.id]||'';
    const c=getCourse(s.courseId);
    html+=`<div class="att-student-row ${val==='P'?'present':val==='A'?'absent':''}">
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${s.name}</div>
        <div style="font-size:10px;color:#94a3b8">${c.name}</div>
      </div>
      <div class="att-toggle">
        <button class="att-btn p-btn ${val==='P'?'active':''}" onclick="markAtt(${s.id},'P','${selDate}')">✅</button>
        <button class="att-btn a-btn ${val==='A'?'active':''}" onclick="markAtt(${s.id},'A','${selDate}')">❌</button>
        <button class="att-btn" style="background:${val==='H'?'#f59e0b':'#f59e0b22'};color:${val==='H'?'#fff':'#f59e0b'};${val==='H'?'transform:scale(1.1)':''}" onclick="markAtt(${s.id},'H','${selDate}')">🏖️</button>
        ${val==='A'?`<button class="att-btn" style="background:#25D36622;color:#25D366" onclick="sendAbsentWA(${s.id},'${selDate}')">📲</button>`:''}
      </div>
    </div>`;
  });
  return html;
}

function markAllAbsent(date,course){
  if(!attendance[date]) attendance[date]={};
  const filtered=students.filter(s=>course==='All'||s.courseId===course);
  filtered.forEach(s=>{attendance[date][s.id]='A';});
  saveAttendance();renderContent();
  showToast('Sabka Absent mark ho gaya!','warn');
}


function sendAbsentWA(sid, date){
  const s=students.find(x=>x.id==sid);
  if(!s||!s.phone) return showToast('Phone number nahi hai!','error');
  const c=getCourse(s.courseId);
  const d=new Date(date);
  const dateFormatted=d.toLocaleDateString('en-IN',{day:'2-digit',month:'long',year:'numeric'});
  const msg=`🎓 *Mani Tech Computer*\n📍 Singhaul Pokhar, Begusarai\n\nNamaste *${s.name}* ji! 🙏\n\n❌ Aap aaj *${dateFormatted}* ko class mein *absent* rahe.\n\n📚 Course: ${c.name}\n\n⚠️ *Don't Miss Your Class!*\n\nDhanyawad! 🙏\n— Mani Tech Computer`;
  window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(msg)}`,'_blank');
  showToast(`${s.name} ko absent message bheja! 📲`);
}

function sendAllAbsentWA(date, course){
  const dayRec=attendance[date]||{};
  const absentList=students.filter(s=>{
    const matchCourse=course==='All'||s.courseId===course;
    return matchCourse && dayRec[s.id]==='A' && s.phone;
  });
  if(!absentList.length) return showToast('Koi absent student nahi!','warn');
  absentList.forEach((s,i)=>setTimeout(()=>sendAbsentWA(s.id,date),i*1200));
  showToast(`${absentList.length} absent students ko message ja raha hai! 📲`);
}

async function downloadAttReport(sid, selMonth){
  const el=document.getElementById('att-report-'+sid);
  if(!el) return showToast('Report load nahi hui!','error');
  showToast('Image ban rahi hai... ⏳','warn');
  try{
    const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
    const s=students.find(x=>x.id==sid);
    const fname=`attendance_${(s?s.name:'student').replace(/\s+/g,'_')}_${selMonth}.png`;
    // Try Web Share API first (mobile)
    canvas.toBlob(async blob=>{
      const file=new File([blob],fname,{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        try{
          await navigator.share({files:[file],title:`Attendance Report - ${s?s.name:''}`,text:`${s?s.name:''} ki ${selMonth} attendance report - Mani Tech Computer`});
          showToast('Share ho gaya! 📲');
          return;
        }catch(e){}
      }
      // Fallback: download
      const a=document.createElement('a');
      a.download=fname;
      a.href=canvas.toDataURL('image/png');
      a.click();
      showToast('Report download ho gayi! ⬇️');
    },'image/png');
  }catch(e){showToast('Error! Dobara try karo','error');}
}

function showToast(msg,type='success'){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.style.background=type==='error'?'#ef4444':type==='warn'?'#f59e0b':'#10b981';
  t.style.opacity='1';
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{t.style.opacity='0';},3500);
}

function updateSyncBadge(state){
  const badge=document.getElementById('sync-badge');
  const icon=document.getElementById('sync-icon');
  const text=document.getElementById('sync-text');
  badge.className='sync-badge';
  if(state==='connected'){badge.classList.add('connected');icon.textContent='🟢';text.textContent='Synced';}
  else if(state==='syncing'){badge.classList.add('syncing');icon.textContent='🔄';text.textContent='Syncing...';}
  else if(state==='error'){badge.classList.add('disconnected');icon.textContent='🔴';text.textContent='Error';}
  else{badge.classList.add('disconnected');icon.textContent='🔴';text.textContent='Not Connected';}
}

async function callSheet(params){
  if(!scriptUrl) throw new Error('no url');
  const url=scriptUrl+'?'+new URLSearchParams(params).toString();
  const res=await fetch(url);
  if(!res.ok) throw new Error('HTTP '+res.status);
  return await res.json();
}
async function syncFromSheets(){
  if(!scriptUrl){updateSyncBadge('disconnected');return;}
  isSyncing=true;updateSyncBadge('syncing');
  try{
    const data=await callSheet({action:'getAll'});
    if(data.students&&Array.isArray(data.students)) students=data.students.map(s=>({...s,totalFee:Number(s.totalFee)||0,paid:Number(s.paid)||0}));
    if(data.courses&&Array.isArray(data.courses)&&data.courses.length>0) courses=data.courses.map(c=>({...c,fee:Number(c.fee)||0}));
    if(data.attendance&&typeof data.attendance==='object') attendance=data.attendance;
    saveAll();
    saveAttendance();
    lastSyncTime=new Date().toLocaleTimeString('en-IN');
    save('mani_last_sync',lastSyncTime);
    updateSyncBadge('connected');
    renderContent();
  }catch(e){updateSyncBadge('error');showToast('Sync failed! Settings check karo','error');}
  isSyncing=false;
}
async function pushStudents(){if(!scriptUrl)return;try{await callSheet({action:'saveStudents',data:JSON.stringify(students)});}catch(e){showToast('Sheet sync nahi hua!','error');}}
async function pushCourses(){if(!scriptUrl)return;try{await callSheet({action:'saveCourses',data:JSON.stringify(courses)});}catch(e){}}
async function pushAttendance(){if(!scriptUrl)return;try{await callSheet({action:'saveAttendance',data:JSON.stringify(attendance)});showToast('Attendance sync ho gaya! ✅');}catch(e){showToast('Attendance sync failed!','error');}}
async function manualSync(){
  if(isSyncing)return;
  if(!scriptUrl){switchTab('settings');showToast('Pehle Script URL daalo!','warn');return;}
  await syncFromSheets();showToast('Sync complete! 🔄');
}

function getCourse(id){return courses.find(c=>c.id===id)||{name:'Unknown',fee:0,duration:''};}
function studentDue(s){return (Number(s.totalFee)||0)-(Number(s.paid)||0);}
function fmtDate(dateStr){if(!dateStr)return '—';const d=new Date(dateStr);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'2-digit',year:'numeric'});}

  const todayP=students.filter(s=>todayAtt[s.id]==='P').length;

    const months=[];

    for(let i=5;i>=0;i--){
      const d=new Date(now.getFullYear(),now.getMonth()-i,1);
      const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
      const label=d.toLocaleString('default',{month:'short'});
      months.push({key,label,amount:0});

    // Sum from payment history if available, else estimate from paid amounts
    (paymentHistory||[]).forEach(p=>{

/* ---- STUDENTS ---- */
function getAllSessions(){
  const sess=new Set(students.map(s=>s.session).filter(Boolean));
  const cur=new Date().getFullYear();
  for(let y=cur-2;y<=cur+2;y++) sess.add(`${y}-${y+1}`);
  return [...sess].sort();
}
function getAllBatches(){
  const b=new Set(students.map(s=>s.batch).filter(Boolean));
  ['7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM','3:00 PM','4:00 PM'].forEach(x=>b.add(x));
  return [...b].sort((a,z)=>{
    const toMin=t=>{const[h,rest]=t.split(':');const[m,ap]=rest.split(' ');return (parseInt(h)%12+(ap==='PM'?12:0))*60+parseInt(m);};
    return toMin(a)-toMin(z);
  });
}

function sendProgressWhatsApp(id){
  const s=students.find(x=>x.id==id);
  if(!s||!s.phone) return showToast('Phone number nahi hai!','error');
  const c=getCourse(s.courseId);
  const due=studentDue(s);
  const paid=Number(s.paid)||0;
  const total=Number(s.totalFee)||0;
  const paidPct=total?Math.round((paid/total)*100):0;

  let present=0,total_days=0;
  Object.values(attendance||{}).forEach(dayAtt=>{
    if(dayAtt[s.id]==='P'){present++;total_days++;}
    else if(dayAtt[s.id]==='A'){total_days++;}
  });
  const attPct=total_days?Math.round((present/total_days)*100):0;

  const msg=`🎓 *Mani Tech Computer*
📍 Singhaul Pokhar, Begusarai

Namaste! 🙏 *${s.name}* ji ka progress report:

👤 *Student:* ${s.name}
📚 *Course:* ${c.name}
📋 *Roll No:* ${s.rollNo||'—'}

💰 *Fee Status:*
  ✅ Paid: ₹${paid.toLocaleString('en-IN')} (${paidPct}%)
  ${due>0?`⚠️ Due: ₹${due.toLocaleString('en-IN')}`:'✅ Fees Clear!'}

📅 *Attendance:* ${present}/${total_days} days (${attPct}%)
${attPct>=75?'✅ Achhi attendance!':attPct>=50?'⚠️ Aur mehnat karein!':'❌ Attendance sudharne ki zaroorat hai!'}

Kisi bhi sawaal ke liye contact karein.

Dhanyawad! 🙏
— Kumud Ranjan
📞 7004595264`;

  window.open(`https://wa.me/91${s.phone}?text=${encodeURIComponent(msg)}`,'_blank');
  showToast(`${s.name} ke parent ko progress report bheja! 📲`);
}

async function downloadProgressPDF(){
  try{
    const box=document.getElementById('progress-render-box');
    if(!box) return showToast('Pehle student chuniye!','error');
    const canvas=await html2canvas(box,{scale:2,backgroundColor:'#0f172a',useCORS:true});
    const name=(document.getElementById('prog-student-select')||{}).value||'progress';
    const a=document.createElement('a');
    a.download='progress_report_'+name+'.png';
    a.href=canvas.toDataURL('image/png');
    a.click();
    showToast('Progress report download ho gayi! ⬇️');
  }catch(e){showToast('Download nahi hua, dobara try karo','error');}
}

function fillStudentReceipt(){
  const sid=document.getElementById('r-student-select').value;
  if(!sid) return;
  const s=students.find(x=>x.id==sid);
  if(!s) return;
  document.getElementById('r-name').value=s.name||'';
  document.getElementById('r-father').value=s.fatherName||'';
  document.getElementById('r-roll').value=s.rollNo||'';
  // Auto bill number = student's last bill no + 1
  const nextBill=String((parseInt(s.lastBillNo)||0)+1).padStart(3,'0');
  document.getElementById('r-recno').value=nextBill;
  document.getElementById('r-phone').value=s.phone||'';
  const csel=document.getElementById('r-course');
  if(csel) for(let o of csel.options){if(o.value===s.courseId){o.selected=true;break;}}
  const due=studentDue(s);
  if(due>0) document.getElementById('r-amt').value=due;
}

function openReceiptFromStudent(sid){
  switchTab('receipt');
  setTimeout(()=>{
    const s=students.find(x=>x.id==sid);
    if(!s) return;
    const sel=document.getElementById('r-student-select');
    if(sel){sel.value=sid;fillStudentReceipt();}
  },100);
}

function submitMarks(eid){
  const ex=exams.find(e=>e.id===eid); if(!ex) return;
  const courseStudents=students.filter(s=>s.courseId===ex.courseId);
  const hasSubjects=ex.subjects&&ex.subjects.length>0;
  if(!results[eid]) results[eid]={};
  courseStudents.forEach(s=>{
    const sr={};
    if(hasSubjects){
      let total=0;
      ex.subjects.forEach(sub=>{
        const inp=document.getElementById(`m-${eid}-${s.id}-${sub.name.replace(/\s/g,'_')}`);
        const v=parseFloat((inp||{}).value)||0;
        sr[sub.name]=v; total+=v;
      });
      sr.total=Math.round(total*100)/100;
    } else {
      sr.total=parseFloat((document.getElementById(`m-${eid}-${s.id}-total`)||{}).value)||0;
    }
    sr.remarks=(document.getElementById(`rem-${eid}-${s.id}`)||{}).value||'';
    results[eid][s.id]=sr;
  });
  saveResults();closeModal();renderContent();
  showToast('Marks save ho gaye! ✅');
}

function renderResultsView(){
  const selExam=(document.getElementById('result-exam-sel')||{}).value||'';
  let html=`<div style="margin-bottom:10px">
    <label style="font-size:11px;color:#94a3b8;display:block;margin-bottom:4px">Exam Chuniye</label>
    <select class="input" id="result-exam-sel" onchange="renderContent()">

      ${exams.map(e=>`<option value="${e.id}" ${selExam===e.id?'selected':''}>${e.name} — ${getCourse(e.courseId).name} (${fmtDate(e.date)})</option>`).join('')}
    </select>
  </div>`;
  if(!selExam) return html+`<div class="empty">Koi exam select karo</div>`;
  const ex=exams.find(e=>e.id===selExam); if(!ex) return html;
  const courseStudents=students.filter(s=>s.courseId===ex.courseId);
  const examResults=results[selExam]||{};
  const hasSubjects=ex.subjects&&ex.subjects.length>0;

  // Stats
  const scored=courseStudents.filter(s=>examResults[s.id]?.total!=null&&examResults[s.id]?.total!=='');
  const passed=scored.filter(s=>(examResults[s.id]?.total||0)>=(ex.totalMarks*0.33));
  const avgScore=scored.length?Math.round(scored.reduce((a,s)=>a+(examResults[s.id]?.total||0),0)/scored.length):0;

  html+=`<div class="grid2" style="margin-bottom:10px">
    <div class="stat-card" style="border-color:#818cf833"><div class="stat-icon">👥</div><div class="stat-value" style="color:#818cf8">${scored.length}/${courseStudents.length}</div><div class="stat-label">Marks Entered</div></div>
    <div class="stat-card" style="border-color:#10b98133"><div class="stat-icon">✅</div><div class="stat-value" style="color:#10b981">${passed.length}</div><div class="stat-label">Pass</div></div>
    <div class="stat-card" style="border-color:#ef444433"><div class="stat-icon">❌</div><div class="stat-value" style="color:#ef4444">${scored.length-passed.length}</div><div class="stat-label">Fail</div></div>
    <div class="stat-card" style="border-color:#f59e0b33"><div class="stat-icon">📊</div><div class="stat-value" style="color:#f59e0b">${avgScore}</div><div class="stat-label">Avg Score</div></div>
  </div>`;

  // Sort by marks desc
  const sorted=[...courseStudents].sort((a,b)=>(examResults[b.id]?.total||0)-(examResults[a.id]?.total||0));
  sorted.forEach((s,idx)=>{
    const sr=examResults[s.id]||{};
    const total=sr.total??'—';
    const pct=typeof total==='number'?Math.round((total/ex.totalMarks)*100):null;
    const pass=typeof total==='number'&&total>=(ex.totalMarks*0.33);
    const grade=pct==null?'—':pct>=90?'A+':pct>=75?'A':pct>=60?'B':pct>=45?'C':pct>=33?'D':'F';
    html+=`<div class="card" style="border-color:${pass?'#10b98133':'#ef444433'};padding:12px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <div>
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:11px;background:#334155;border-radius:6px;padding:2px 7px;font-weight:700">#${idx+1}</span>
            <span style="font-size:13px;font-weight:700">${s.name}</span>
          </div>
          ${hasSubjects?`<div style="font-size:10px;color:#94a3b8;margin-top:3px">${ex.subjects.map(sub=>`${sub.name}: ${sr[sub.name]??'—'}`).join(' | ')}</div>`:''}
          ${sr.remarks?`<div style="font-size:10px;color:#fbbf24;margin-top:2px">📝 ${sr.remarks}</div>`:''}
        </div>
        <div style="text-align:right">
          <div style="font-size:18px;font-weight:800;color:${pass?'#10b981':'#ef4444'};font-family:'Baloo 2',cursive">${total}/${ex.totalMarks}</div>
          <div style="display:flex;gap:4px;justify-content:flex-end;margin-top:3px">
            <span style="font-size:10px;background:${pass?'#10b98122':'#ef444422'};color:${pass?'#10b981':'#ef4444'};padding:2px 6px;border-radius:6px">${pass?'PASS':'FAIL'}</span>
            <span style="font-size:10px;background:#818cf822;color:#818cf8;padding:2px 6px;border-radius:6px">${grade}</span>
          </div>
        </div>
      </div>
    </div>`;
  });
  if(!courseStudents.length) html+=`<div class="empty">Is course mein koi student nahi</div>`;

  html+=`<div style="display:flex;gap:8px;margin-top:4px">
    <button class="btn btn-green" style="flex:1;padding:11px;font-size:13px;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:6px" onclick="shareResultsWA('${selExam}')">📲 Sabko WA Bhejo</button>
    <button class="btn" style="flex:1;padding:11px;font-size:13px;border-radius:12px;background:linear-gradient(135deg,#1e40af,#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;gap:6px" onclick="openReportCardModal('${selExam}')">🎓 Report Cards</button>
  </div>`;
  return html;
}

/* ---- REPORT CARD ---- */
function getGrade(pct){
  if(pct==null) return '—';
  return pct>=90?'A+':pct>=75?'A':pct>=60?'B':pct>=45?'C':pct>=33?'D':'F';
}
function getGradeColor(grade){
  const m={A:'#10b981','A+':'#10b981',B:'#3b82f6',C:'#f59e0b',D:'#fb923c',F:'#ef4444','—':'#94a3b8'};
  return m[grade]||'#94a3b8';
}

  const ex=exams.find(e=>e.id===eid); if(!ex) return;

  const mc=document.getElementById('modal-container');
  mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" style="max-height:90vh;overflow-y:auto">

      <div style="display:flex;flex-direction:column;gap:8px">
        ${courseStudents.length===0?'<div class="empty">Koi student nahi</div>':courseStudents.map(s=>{
          const sr=(results[eid]||{})[s.id]||{};
          const total=sr.total??null;
          const pct=total!=null?Math.round((total/ex.totalMarks)*100):null;
          const grade=getGrade(pct);

          return `<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#0f172a;border-radius:10px;border-left:3px solid ${pass?'#10b981':'#ef4444'}">

              <div style="font-size:13px;font-weight:700">${s.name}</div>

              <button class="btn" style="padding:7px 10px;background:#7c3aed;color:#fff;border-radius:8px;font-size:11px" onclick="showStudentReportCard('${eid}',${s.id})">📄 Card</button>
              ${s.phone&&total!=null?`<button class="btn btn-green" style="padding:7px 10px;border-radius:8px;font-size:11px" onclick="sendReportCardWA('${eid}',${s.id})">📲</button>`:''}

        }).join('')}

      <button class="btn btn-gray" style="width:100%;padding:12px;margin-top:14px;border-radius:12px" onclick="closeModal()">Wapas Jao</button>
    </div>
  </div>`;

function showStudentReportCard(eid, sid){
  const ex=exams.find(e=>e.id===eid); if(!ex) return;
  const stu=students.find(s=>s.id==sid); if(!stu) return;
  const c=getCourse(ex.courseId);
  const sr=(results[eid]||{})[sid]||{};
  const total=sr.total??null;
  const pct=total!=null?Math.round((total/ex.totalMarks)*100):null;
  const grade=getGrade(pct);
  const pass=pct!=null&&pct>=33;
  const hasSubjects=ex.subjects&&ex.subjects.length>0;
  const mc=document.getElementById('modal-container');

  let subjectRows='';

    ex.subjects.forEach(sub=>{
      const subMark=sr[sub.name]??null;

      subjectRows+=`<tr>
        <td style="text-align:left;padding:6px 8px;border:1px solid #ddd;font-size:11px">${sub.name}</td>

        <td style="padding:6px 8px;border:1px solid #ddd;text-align:center;font-weight:700;color:${subPass?'#10b981':'#ef4444'}">${subMark??'—'}</td>
        <td style="padding:6px 8px;border:1px solid #ddd;text-align:center"><span style="background:${getGradeColor(subGrade)}22;color:${getGradeColor(subGrade)};padding:2px 6px;border-radius:4px;font-weight:700">${subGrade}</span></td>
      </tr>`;
    });
    subjectRows+=`<tr class="rc-total-row">

function sendReportCardWA(eid, sid){
  const ex=exams.find(e=>e.id===eid); if(!ex) return;
  const stu=students.find(s=>s.id==sid); if(!stu||!stu.phone) return showToast('Phone number nahi hai!','error');
  const c=getCourse(ex.courseId);
  const sr=(results[eid]||{})[sid]||{};
  const total=sr.total??null;
  const pct=total!=null?Math.round((total/ex.totalMarks)*100):null;
  const grade=getGrade(pct);
  const pass=pct!=null&&pct>=33;
  const hasSubjects=ex.subjects&&ex.subjects.length>0;
  let msg=`🎓 *Mani Tech Computer*\n📍 Singhaul Pokhar, Begusarai\n\n📄 *Report Card*\n\n👤 *${stu.name}*\n📚 Course: ${c.name}\n📝 Exam: ${ex.name}\n📅 Date: ${fmtDate(ex.date)}\n\n`;
  if(hasSubjects){
    msg+=`📋 *Subject-wise Marks:*\n`;
    ex.subjects.forEach(sub=>{ msg+=`  • ${sub.name}: ${sr[sub.name]??'—'} / ${sub.maxMarks}\n`; });
    msg+=`\n`;
  }
  msg+=`📊 *Total: ${total??'—'} / ${ex.totalMarks}*\n`;
  msg+=`📈 Percentage: ${pct??'—'}%\n`;
  msg+=`🏅 Grade: *${grade}*\n`;
  msg+=`✅ Result: *${pass?'PASS 🎉':'FAIL ❌'}*\n`;
  if(sr.remarks) msg+=`📝 Remarks: ${sr.remarks}\n`;
  msg+=`\nDhanyawad! 🙏\n— Kumud Ranjan | Mani Tech Computer`;
  window.open(`https://wa.me/91${stu.phone}?text=${encodeURIComponent(msg)}`,'_blank');
  showToast(`${stu.name} ko Report Card bheja! 📲`);
}

async function downloadReportCard(sid){
  const el=document.getElementById(`rc-render-${sid}`);
  if(!el) return showToast('Report Card nahi mili!','error');
  showToast('Image ban rahi hai... ⏳','warn');
  try{
    const canvas=await html2canvas(el,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
    const stu=students.find(s=>s.id==sid);
    const fname=`report_card_${(stu?stu.name:'student').replace(/\s+/g,'_')}.png`;
    canvas.toBlob(async blob=>{
      const file=new File([blob],fname,{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file],title:'Report Card'});showToast('Share ho gaya! 📲');return;}catch(e){}
      }
      const a=document.createElement('a');a.download=fname;a.href=canvas.toDataURL('image/png');a.click();
      showToast('Download ho gayi! ⬇️');
    },'image/png');
  }catch(e){showToast('Error! Dobara try karo','error');}
}

function shareResultsWA(eid){
  const ex=exams.find(e=>e.id===eid); if(!ex) return;
  const courseStudents=students.filter(s=>s.courseId===ex.courseId);
  const examResults=results[eid]||{};
  const sorted=[...courseStudents].sort((a,b)=>(examResults[b.id]?.total||0)-(examResults[a.id]?.total||0));
  let msg=`🎓 *Mani Tech Computer*\n📍 Singhaul Pokhar, Begusarai\n\n📝 *${ex.name} Results*\n📅 ${fmtDate(ex.date)} | Max: ${ex.totalMarks}\n\n`;
  sorted.forEach((s,i)=>{
    const sr=examResults[s.id]||{};
    const total=sr.total??'—';
    const pass=typeof total==='number'&&total>=(ex.totalMarks*0.33);
    msg+=`${i+1}. ${s.name}: *${total}/${ex.totalMarks}* ${pass?'✅':'❌'}\n`;
  });
  msg+=`\nDhanyawad! 🙏\n— Mani Tech Computer`;
  window.open(`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
  showToast('Results share ho rahe hain! 📲');
}

function openAddSlot(courseId){
  const mc=document.getElementById('modal-container');

      <div class="modal-title" style="color:#c4b5fd">🗓️ Naya Time Slot</div>
      <label>Din (Day) *</label>
      <select class="input" id="sl-day">
        ${['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'].map(d=>`<option>${d}</option>`).join('')}
      </select>
      <label>Time *</label><input class="input" id="sl-time" type="time" value="09:00">
      <label>Subject *</label><input class="input" id="sl-subject" placeholder="Jaise: Tally, MS Office, Python">

      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn btn-gray" style="flex:1;padding:12px" onclick="closeModal()">Cancel</button>

      </div>
    </div>
  </div>`;
}
function submitAddSlot(courseId){
  const day=document.getElementById('sl-day').value;
  const time=document.getElementById('sl-time').value;
  const subject=(document.getElementById('sl-subject').value||'').trim();
  const teacher=(document.getElementById('sl-teacher').value||'').trim();
  if(!subject||!time) return showToast('Subject aur time zaruri!','error');
  if(!timetable[courseId]) timetable[courseId]=[];
  timetable[courseId].push({day,time,subject,teacher});
  saveTimetable();closeModal();renderContent();
  showToast(`${day} ${time} slot add ho gaya! ✅`);
}
function deleteSlot(courseId,idx){
  if(!timetable[courseId]) return;
  timetable[courseId].splice(idx,1);
  saveTimetable();renderContent();showToast('Slot delete ho gaya!');
}
function shareTimetableWA(courseId){
  const c=getCourse(courseId);
  const tt=timetable[courseId]||[];
  const days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  let msg=`🎓 *Mani Tech Computer*\n📍 Singhaul Pokhar, Begusarai\n\n🗓️ *${c.name} — Timetable*\n\n`;
  days.forEach(day=>{
    const slots=tt.filter(s=>s.day===day).sort((a,b)=>a.time.localeCompare(b.time));
    if(!slots.length) return;
    msg+=`*${day}*\n`;
    slots.forEach(s=>{ msg+=`  ⏰ ${s.time} — ${s.subject}${s.teacher?' ('+s.teacher+')':''}\n`; });

/* ---- MODALS ---- */
function getNextRollNo(){
  // Auto-generate next roll number
  const nums=students.map(s=>parseInt(s.rollNo)||0);
  return String((nums.length?Math.max(...nums):0)+1).padStart(3,'0');
}
function getNextBillNo(){
  // Auto-generate next bill number
  const nums=students.map(s=>parseInt(s.lastBillNo)||0);
  return String((nums.length?Math.max(...nums):0)+1).padStart(3,'0');
}

function getSessionOptions(sel){
  const cur=new Date().getFullYear();
  const sessions=[];
  for(let y=cur-2;y<=cur+2;y++) sessions.push(`${y}-${y+1}`);
  return sessions.map(s=>`<option value="${s}" ${sel===s?'selected':''}>${s}</option>`).join('');
}
function getBatchOptions(sel){
  const batches=['7:00 AM','8:00 AM','9:00 AM','10:00 AM','11:00 AM','3:00 PM','4:00 PM'];
  return batches.map(b=>`<option value="${b}" ${sel===b?'selected':''}>${b}</option>`).join('');
}
function getDefaultSession(){
  const y=new Date().getFullYear();
  const m=new Date().getMonth();
  return m>=3?`${y}-${y+1}`:`${y-1}-${y}`;
}

async function submitAddStudent(){
  const name=(document.getElementById('m-name').value||'').trim();
  const fatherName=(document.getElementById('m-father').value||'').trim();
  const phone=(document.getElementById('m-phone').value||'').trim();
  const rollNo=(document.getElementById('m-roll').value||'').trim();
  const courseId=document.getElementById('m-course').value;
  const date=document.getElementById('m-date').value;
  const dob=(document.getElementById('m-dob')||{}).value||'';
  const session=(document.getElementById('m-session')||{}).value||getDefaultSession();
  const batch=(document.getElementById('m-batch')||{}).value||'7:00 AM';
  if(!name||!phone) return showToast('Naam aur phone zaruri!','error');
  if(phone.length!==10) return showToast('10 digit number daalo!','error');
  const c=courses.find(x=>x.id===courseId);
  students.push({id:Date.now(),name,fatherName,phone,rollNo,courseId,totalFee:c.fee,paid:0,joinDate:date,dob,lastBillNo:0,session,batch});
  saveAll();closeModal();renderContent();
  showToast(`${name} add ho gaya! ✅`);

function openPayment(id){
  const s=students.find(x=>x.id==id);if(!s)return;
  const due=studentDue(s);
  const quick=[500,1000,1500,2000].filter(v=>v<=due);
  const mc=document.getElementById('modal-container');
  mc.innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()">

      <div class="modal-title" style="color:#fbbf24">💰 Fee Jama Karo</div>

function setAmt(v,btn){document.getElementById('m-amt').value=v;document.querySelectorAll('.quick-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');}
async function submitPayment(id,maxDue){
  const amt=parseFloat(document.getElementById('m-amt').value);
  if(!amt||amt<=0) return showToast('Valid amount daalo!','error');
  if(amt>maxDue) return showToast('Amount zyada hai!','error');
  students=students.map(s=>s.id==id?{...s,paid:(Number(s.paid)||0)+amt}:s);
  // Save to payment history for monthly chart
  paymentHistory.push({studentId:id,amount:amt,date:todayStr()});
  save('mani_payment_history',paymentHistory);
  saveAll();closeModal();renderContent();
  showToast(`₹${amt} add ho gayi! 💰`);
  await pushStudents();
}

async function submitCourse(cid){
  const name=(document.getElementById('cm-name').value||'').trim();
  const dur=(document.getElementById('cm-dur').value||'').trim();
  const fee=parseFloat(document.getElementById('cm-fee').value);
  if(!name||!dur||!fee||fee<=0) return showToast('Sab fields bharein!','error');
  if(cid){courses=courses.map(c=>c.id===cid?{...c,name,duration:dur,fee}:c);showToast('Update ho gaya! ✅');}
  else{courses.push({id:'c'+Date.now(),name,duration:dur,fee});showToast('Course add ho gaya! ✅');}

}
async function deleteCourse(cid){
  if(students.some(s=>s.courseId===cid)) return showToast('Ye course assign hai kisi student ko!','error');
  courses=courses.filter(c=>c.id!==cid);saveAll();renderContent();showToast('Delete ho gaya!');await pushCourses();
}
async function deleteStudent(id){
  if(!confirm('Delete karna chahte ho?')) return;
  students=students.filter(s=>s.id!=id);saveAll();renderContent();showToast('Delete ho gaya!');await pushStudents();
}

const SCRIPT_CODE=`const SHEET_ID = SpreadsheetApp.getActiveSpreadsheet().getId();
function doGet(e){return handleRequest(e);}
function doPost(e){return handleRequest(e);}
function handleRequest(e){
  const params=e.parameter,action=params.action;
  const ss=SpreadsheetApp.openById(SHEET_ID);
  let result={};
  try{
    if(action==='getAll'){
      result={
        students:sheetToArray(ss.getSheetByName('Students')),
        courses:sheetToArray(ss.getSheetByName('Courses')),
        attendance:attSheetToObj(ss.getSheetByName('Attendance'))
      };
    } else if(action==='saveStudents'){
      const data=JSON.parse(decodeURIComponent(params.data));
      arrayToSheet(ss.getSheetByName('Students'),data,['id','name','fatherName','phone','rollNo','courseId','totalFee','paid','joinDate','lastBillNo','session','batch']);
      result={success:true};
    } else if(action==='saveCourses'){
      const data=JSON.parse(decodeURIComponent(params.data));
      arrayToSheet(ss.getSheetByName('Courses'),data,['id','name','duration','fee']);
      result={success:true};
    } else if(action==='saveAttendance'){
      const data=JSON.parse(decodeURIComponent(params.data));
      saveAttSheet(ss,data);
      result={success:true};
    }
  }catch(err){result={error:err.message};}
  return ContentService.createTextOutput(JSON.stringify(result)).setMimeType(ContentService.MimeType.JSON);
}
function sheetToArray(sheet){
  if(!sheet) return [];
  const rows=sheet.getDataRange().getValues();
  if(rows.length<2) return [];
  const headers=rows[0];
  return rows.slice(1).map(row=>{const obj={};headers.forEach((h,i)=>obj[h]=row[i]);return obj;});
}
function arrayToSheet(sheet,data,headers){
  if(!sheet) return;
  sheet.clearContents();
  sheet.appendRow(headers);
  data.forEach(item=>sheet.appendRow(headers.map(h=>item[h]??'')));
}
function attSheetToObj(sheet){
  if(!sheet) return {};
  const rows=sheet.getDataRange().getValues();
  if(rows.length<2) return {};
  const result={};
  rows.slice(1).forEach(row=>{
    const date=String(row[0]),sid=String(row[1]),val=String(row[2]);
    if(!date||!sid||!val||val==='undefined') return;
    if(!result[date]) result[date]={};
    result[date][sid]=val;
  });
  return result;
}
function saveAttSheet(ss,attObj){
  let sheet=ss.getSheetByName('Attendance');
  if(!sheet) sheet=ss.insertSheet('Attendance');
  sheet.clearContents();
  sheet.appendRow(['date','studentId','status']);
  const rows=[];
  Object.keys(attObj).sort().forEach(function(date){
    Object.keys(attObj[date]).forEach(function(sid){
      rows.push([date,sid,attObj[date][sid]]);
    });
  });
  if(rows.length) sheet.getRange(2,1,rows.length,3).setValues(rows);
}`;

function copyScript(){

}

function buildAppContext() {
  const today = new Date();
  const todayKey = todayStr();
  const todayAtt = attendance[todayKey] || {};
  const presentToday = students.filter(s => todayAtt[s.id] === 'P').length;
  const absentToday = students.filter(s => todayAtt[s.id] === 'A').length;
  const notMarked = students.length - presentToday - absentToday;
  const totalDue = students.reduce((sum, s) => sum + studentDue(s), 0);
  const dueStudents = students.filter(s => studentDue(s) > 0);
  const clearStudents = students.filter(s => s.totalFee > 0 && studentDue(s) === 0);
  const totalCollected = students.reduce((sum, s) => sum + (Number(s.paid) || 0), 0);

  const bdayToday = students.filter(s => {
    if (!s.dob) return false;
    const d = new Date(s.dob);
    return d.getDate() === today.getDate() && d.getMonth() === today.getMonth();
  });
  const bdayUpcoming = students.filter(s => {
    if (!s.dob) return false;
    const d = new Date(s.dob);
    const thisYear = new Date(today.getFullYear(), d.getMonth(), d.getDate());
    const diff = Math.round((thisYear - today) / (1000 * 60 * 60 * 24));
    return diff > 0 && diff <= 7;
  });

  const top5due = [...dueStudents].sort((a, b) => studentDue(b) - studentDue(a)).slice(0, 5);

  const courseWise = courses.map(c => ({
    name: c.name,
    count: students.filter(s => s.courseId === c.id).length
  })).filter(c => c.count > 0);

  const studentDetails = students.map(s => {
    const c = getCourse(s.courseId);
    const attSt = attStats(s.id);
    return s.name + ' | Phone: ' + s.phone + ' | Course: ' + c.name + ' | Paid: Rs.' + s.paid + ' | Due: Rs.' + studentDue(s) + ' | Batch: ' + (s.batch||'-') + ' | Session: ' + (s.session||'-') + ' | Attendance: ' + attSt.pct + '% (' + attSt.p + 'P/' + attSt.a + 'A)';
  }).join('\n');

  return 'Aaj ki date: ' + today.toLocaleDateString('en-IN', {weekday:'long',day:'numeric',month:'long',year:'numeric'}) + '\n\n=== MANI TECH COMPUTER DATA ===\n\nOVERVIEW:\n- Total Students: ' + students.length + '\n- Total Courses: ' + courses.length + '\n- Total Collection: Rs.' + totalCollected + '\n- Total Due: Rs.' + totalDue + '\n- Due Students: ' + dueStudents.length + '\n- Clear Students: ' + clearStudents.length + '\n\nAAJ KI ATTENDANCE (' + todayKey + '):\n- Present: ' + presentToday + '\n- Absent: ' + absentToday + '\n- Not Marked: ' + notMarked + '\n\nBIRTHDAYS:\n- Aaj: ' + (bdayToday.length > 0 ? bdayToday.map(s=>s.name).join(', ') : 'Koi nahi') + '\n- Agle 7 din: ' + (bdayUpcoming.length > 0 ? bdayUpcoming.map(s=>{const d=new Date(s.dob);const ty=new Date(today.getFullYear(),d.getMonth(),d.getDate());const dl=Math.round((ty-today)/(864e5));return s.name+' ('+dl+' din mein)';}).join(', ') : 'Koi nahi') + '\n\nTOP 5 DUE:\n' + (top5due.length > 0 ? top5due.map(s=>'- '+s.name+': Rs.'+studentDue(s)+' | Phone: '+s.phone).join('\n') : 'Koi nahi') + '\n\nCOURSE-WISE:\n' + courseWise.map(c=>'- '+c.name+': '+c.count+' students').join('\n') + '\n\nALL STUDENTS:\n' + (studentDetails || 'Koi nahi');
}

async function sendAIMessage() {
  if (aiIsLoading) return;
  const input = document.getElementById('ai-input-field');
  if (!input) return;
  const msg = (input.value || '').trim();
  if (!msg) return;

  input.value = '';
  input.style.height = 'auto';
  appendAIMessage('user', msg);
  aiChatHistory.push({role:'user', content:msg});

  aiIsLoading = true;
  const sendBtn = document.getElementById('ai-send-btn');
  if (sendBtn) sendBtn.disabled = true;
  const loadingId = appendAIMessage('bot', '<div class="ai-typing"><span></span><span></span><span></span></div>', true);

  try {
    const appContext = buildAppContext();
    const systemPrompt = 'Tu Mani Tech Computer ka AI assistant hai. Ye ek computer training institute hai Singhaul Pokhar, Begusarai mein.\n\nNeeche institute ka data hai. Is data ke basis pe user ke sawaalon ke jawaab do.\n\nJawab HAMESHA Hindi/Hinglish mein do — simple, friendly aur helpful. Numbers ke sath Rs. sign use karo. Agar specific student ka naam pooche toh unka phone number bhi batao. Agar data mein koi cheez nahi milti toh seedha bolo "Is baare mein data nahi mila."\n\n' + appContext;

    const messages = aiChatHistory.slice(0, -1).concat([{role:'user', content:msg}]);

    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: messages
      })
    });

    const data = await response.json();
    const reply = (data.content && data.content[0]) ? data.content[0].text : 'Kuch galat ho gaya. Dobara try karo.';

    updateAIMessage(loadingId, reply);
    aiChatHistory.push({role:'assistant', content:reply});
    if (aiChatHistory.length > 20) aiChatHistory = aiChatHistory.slice(-20);

  } catch(e) {
    updateAIMessage(loadingId, 'Network error. Internet check karo aur dobara try karo.');
  }

  aiIsLoading = false;
  const sendBtn2 = document.getElementById('ai-send-btn');
  if (sendBtn2) sendBtn2.disabled = false;
  scrollAIToBottom();
}

let aiMsgIdCounter = 0;
function appendAIMessage(role, html, isLoading) {
  const id = 'ai-msg-' + (++aiMsgIdCounter);

  const div = document.createElement('div');
  div.className = 'ai-msg ' + role + (isLoading ? ' loading' : '');

  el.appendChild(div);
  scrollAIToBottom();

}

function updateAIMessage(id, text) {

  el.classList.remove('loading');
  el.innerHTML = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g, '<br>');
}

function scrollAIToBottom() {
  const el = document.getElementById('ai-messages');
  if (el) el.scrollTop = el.scrollHeight;
}

if(isIOS&&!isStandalone&&!localStorage.getItem('ios-hint-shown')){
  localStorage.setItem('ios-hint-shown','1');
  setTimeout(()=>{
    const banner=document.createElement('div');
    banner.style.cssText='position:fixed;bottom:80px;left:50%;transform:translateX(-50%);width:calc(100% - 32px);max-width:400px;background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;border-radius:16px;padding:14px 16px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5);border:1px solid #334155';
    banner.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <div style="font-size:24px">📱</div>
        <div style="font-size:13px;font-weight:800">iPhone pe App Install Karo</div>
        <button onclick="this.parentElement.parentElement.remove()" style="margin-left:auto;background:none;border:none;color:#94a3b8;font-size:18px;cursor:pointer">✕</button>
      </div>
      <div style="font-size:11px;color:#94a3b8;line-height:1.7">
        1️⃣ Neeche Safari ka <b style="color:#3b82f6">Share</b> button dabaao (⬆️)<br>
        2️⃣ <b style="color:#3b82f6">"Add to Home Screen"</b> select karo<br>
        3️⃣ <b style="color:#10b981">Add</b> dabaao — ho gaya! 🎉
      </div>`;
    document.body.appendChild(banner);
    setTimeout(()=>banner.remove(),12000);
  },2000);
}
</script>
<style>
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
</style>
</body>
</html>
